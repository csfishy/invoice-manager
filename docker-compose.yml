services:
  postgres:
    image: postgres:16-alpine
    container_name: invoice-manager-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invoice-manager-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ASPNETCORE_URLS: http://+:8080
      Database__Provider: ${DATABASE_PROVIDER}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Uploads__Path: ${UPLOADS_PATH}
      Attachments__MaxFileSizeBytes: ${ATTACHMENTS_MAX_FILE_SIZE_BYTES}
      Attachments__AllowedExtensions: ${ATTACHMENTS_ALLOWED_EXTENSIONS}
      Licensing__LicenseFilePath: ${LICENSE_FILE_PATH}
      Licensing__FingerprintSalt: ${LICENSE_FINGERPRINT_SALT}
      Licensing__LicensedProductName: ${LICENSED_PRODUCT_NAME}
      Licensing__AllowUnlicensedDevelopmentMode: ${LICENSE_ALLOW_UNLICENSED_DEVELOPMENT_MODE}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__LifetimeMinutes: ${JWT_LIFETIME_MINUTES}
      Seed__DefaultAdminUsername: ${DEFAULT_ADMIN_USERNAME}
      Seed__DefaultAdminPassword: ${DEFAULT_ADMIN_PASSWORD}
      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/license:/app/data/license
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: invoice-manager-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
