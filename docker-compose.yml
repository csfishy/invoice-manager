services:
  postgres:
    image: postgres:16-alpine
    container_name: invoice-manager-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invoice-manager-backend
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Uploads__Path: ${UPLOADS_PATH}
      Licensing__PublicKeyPath: ${LICENSE_PUBLIC_KEY_PATH}
      Licensing__LicenseFilePath: ${LICENSE_FILE_PATH}
      Licensing__FingerprintSalt: ${LICENSE_FINGERPRINT_SALT}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Seed__DefaultAdminUsername: ${DEFAULT_ADMIN_USERNAME}
      Seed__DefaultAdminPassword: ${DEFAULT_ADMIN_PASSWORD}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/license:/app/data/license

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: invoice-manager-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

